- id: simulador_fuente_radiactiva
  titulo: "Electronic Radioactive Source Simulator as a Tool for Teaching Nuclear Physics"
  anio: "2025"
  nivel: "Ingeniería"
  tipo: ["Memorias de Congreso"]
  resumen: "Este proyecto presenta el diseño e implementación de un simulador electrónico de bajo costo concebido como un análogo físico para la enseñanza de la desintegración radiactiva. Ante las restricciones logísticas y de seguridad que implica el uso de fuentes radiactivas reales, se desarrolló un sistema que utiliza un microcontrolador Raspberry Pi Pico para emular la actividad radiactiva disminuyendo la intensidad de un LED mediante PWM, medida por un sensor BH1750."
  director: "Dr. Christian Roberto Ibáñez Nangüelú"
  escuela: "Universidad Politécnica de Chiapas"
  github: "https://github.com/cribnez/simulador-fuente-radiactiva" # Cambia esto por tu link real
  imagen: "https://res.cloudinary.com/dxcfe76rj/image/upload/w_800,h_450,c_fill,g_auto,f_auto,q_auto/v1776962812/Captura_de_pantalla_2026-04-23_104631_ncodku.png"
  link: "/proyectos/simulador_fuente_radiactiva.html"
  autores_lista:
    - "Georgina Hernández Santiz"
    - "Adriana Jackeline Hernández Carbajal"
    - "Abigail Peláez Segura"
  resultados_lista:
    - "Implementación de un análogo físico seguro y de bajo costo."
    - "Emulación precisa de la ley de decaimiento exponencial con Raspberry Pi Pico."
    - "Interfaz gráfica interactiva en Python (PyQt5) para análisis de datos."

- id: monitoreo_geriatrico_iot
  titulo: "Diseño de un sistema embebido basado en IoT para la monitorización remota de signos vitales en pacientes geriátricos"
  anio: "2025"
  nivel: "Ingeniería"
  tipo: ["Artículo"]
  resumen: "Este proyecto presenta el diseño y validación de un sistema de telemonitorización de signos vitales en tiempo real para pacientes de la tercera edad. Utiliza un microcontrolador ESP32 y sensores de bajo costo para adquirir datos de ECG, SpO2, frecuencia cardíaca y temperatura. Implementa procesamiento en el borde (edge computing) para optimizar la transmisión de datos a una plataforma IoT, permitiendo una supervisión médica remota constante y eficiente."
  director: 
    - "Dr. Christian Roberto Ibáñez Nangüelú"  
    - "Dra. María de Lourdes Corzo Cuesta"
  escuela: "Universidad Politécnica de Chiapas"
  github: "https://github.com/cribnez/telemonitoring-geriatric-vitals-iot"
  imagen: "https://res.cloudinary.com/dxcfe76rj/image/upload/w_1000,h_563,c_fill,g_auto,f_auto,q_auto/v1776964247/dashboard_hax4sj.jpg"
  link: "/proyectos/monitoreo_geriatrico_iot.html"
  autores_lista:
    - "Wilber Franco Gutiérrez"
    - "Jose Angel Ramos Escobar"
  resultados_lista:
    - "Desarrollo de un prototipo portátil de bajo costo para monitorización continua."
    - "Integración de múltiples sensores biomédicos (ECG, SpO2, Temperatura) en una sola plataforma."
    - "Reducción del tráfico de red mediante técnicas de procesamiento en el borde (Edge Computing)."
    - "Visualización de datos en tiempo real para facilitar la toma de decisiones médicas preventivas."

- id: estimulacion_prematuros
  titulo: "Early Stimulation Device for Premature Babies"
  anio: "2025"
  nivel: "Ingeniería"
  tipo: ["Artículo"]
  resumen: "Este proyecto presenta el diseño de un dispositivo de estimulación sensorial integral (auditiva, táctil y visual) para bebés prematuros. Basado en principios de neurociencia del desarrollo y el método de Rood, el dispositivo busca mitigar los efectos negativos de la exposición temprana a entornos clínicos. Consta de tres módulos independientes que emiten sonidos suaves, vibraciones controladas para respuestas neuromotoras y estímulos visuales breves para apoyar el desarrollo neurológico en etapas críticas."
  director: 
    - "Dr. Christian Roberto Ibáñez Nangüelú"
  escuela: "Universidad Politécnica de Chiapas"
  github: "https://github.com/cribnez/Cunero-Estimulacion-Sensorial-UPChiapas" # Ajustar con tu link real
  imagen: "https://res.cloudinary.com/dxcfe76rj/image/upload/w_1000,h_563,c_fill,g_auto,f_auto,q_auto/v1776973150/estimulacion_sensorial_fticwg.png"
  link: "/proyectos/estimulacion_prematuros.html"
  autores_lista:
    - "Calvo Cruz Diego Andrés"
    - "Benitez Muñoz Josué"
    - "Irving Roque López (Hospital de Especialidades Pediátricas)"
  resultados_lista:
    - "Diseño de un sistema modular de estimulación sensorial basado en el método de Rood."
    - "Implementación de un módulo táctil con vibraciones ajustables para promover respuestas neuromotoras."
    - "Integración de estímulos auditivos y visuales dentro de niveles de seguridad clínica."
    - "Validación conceptual del dispositivo como herramienta de apoyo en la neurorrehabilitación temprana."

- id: dispositivo_monitoreo_orina
  titulo: "Desarrollo de un dispositivo electrónico para el monitoreo no invasivo de parámetros físicos y visuales en orina"
  anio: "2025"
  nivel: "Ingeniería"
  tipo: ["Artículo"]
  resumen: "Desarrollo de un prototipo electrónico de bajo costo basado en Raspberry Pi para el monitoreo multifuncional de la salud urinaria. Integra un caudalímetro, un sensor ultrasónico y una cámara con algoritmos de visión artificial para medir el flujo máximo (Qmax), estimar el volumen residual post-miccional y realizar un análisis colorimétrico automatizado para la detección de hematuria."
  director: ["Dr. Christian Roberto Ibáñez Nangüelú", "Dr. Roberto Ibáñez Córdova", "Dra. Diana Paulina Martínez Cancino", "Dr. José Octavio Vázquez Buenos Aires", "Dr. Norberto Urbina Brito", "Dr. Jorge Alberto Rodríguez Ramírez", "Dr. Rigoberto Jiménez Jonapá"]
  autores_lista: ["Kevin Patricio Carrasco Ruiz", "Georgina Hernández Santiz", "Dorian Alberto Ibáñez Nangüelú"]
  correo: "221048@ib.upchiapas.edu.mx"
  escuela: "UP Chiapas / TecNM / TENAM"
  carrera: "Ingeniería Biomédica y Mecatrónica"
  link: "/proyectos/dispositivo_monitoreo_orina.html"
  imagen: "https://res.cloudinary.com/dxcfe76rj/image/upload/v1779126206/prototipo_hardware_orina_m5dyfa.png"
  github: "https://github.com/cribnez/dispositivo-monitoreo-orina"
  resultados_lista:
    - "El módulo de uroflujometría fue validado con un error promedio por debajo del 5% respecto a los volúmenes de referencia, mostrando una respuesta lineal y proporcional."
    - "El sistema registró fielmente las curvas de flujo en forma de campana y calculó con precisión el flujo máximo (Qmax), indicativo de obstrucciones urinarias."
    - "El módulo de visión artificial, utilizando doble máscara en el espacio HSV, alcanzó una sensibilidad del 95% en la identificación de trazas de sangre (hematuria)."
    - "Se implementó con éxito una interfaz gráfica estable que permite la visualización en tiempo real del volumen acumulado y genera un reporte médico unificado."

